<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrucchiere Rossi - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: linear-gradient(135deg, #1a1a1a, #252525);
            padding: 60px 40px;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.15);
            max-width: 450px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d4af37, #c0a080);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 32px;
            color: #000;
            margin: 0 auto 25px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: #d4af37;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #cccccc;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #f5f5f5;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #333;
            background: #0f0f0f;
            color: #f5f5f5;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
            background: rgba(212, 175, 55, 0.02);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37, #c0a080);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-link a:hover {
            color: #ffd700;
        }

        .error-msg {
            display: none;
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
            font-size: 14px;
        }

        .error-msg.show {
            display: block;
        }

        .info-text {
            background: rgba(212, 175, 55, 0.1);
            color: #cccccc;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 3px solid #d4af37;
            font-size: 13px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 40px 25px;
            }

            .login-header h1 {
                font-size: 28px;
            }

            .login-logo {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">PR</div>
            <h1>Dashboard</h1>
            <p id="loginSalonName">Parrucchiere Rossi</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Es: parrucchiere@parrucchiererossi.it"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">🔐 Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Inserisci la password"
                    required
                >
            </div>

            <button type="submit" class="login-btn">🔓 Accedi al Dashboard</button>
        </form>

        <div style="margin-top: 30px; padding-top: 30px; border-top: 1px solid rgba(212, 175, 55, 0.2);">
            <p style="color: #d4af37; font-weight: 600; margin-bottom: 12px; font-size: 13px;">📝 Credenziali Demo (Test):</p>
            <div style="background: #0f0f0f; padding: 12px; border-radius: 8px; border-left: 3px solid #d4af37; margin-bottom: 12px;">
                <p style="color: #ccc; font-size: 12px; margin-bottom: 4px;"><strong>Proprietario:</strong></p>
                <p style="color: #ccc; font-size: 12px; margin-bottom: 2px;"><strong>Email:</strong> admin@salone.it</p>
                <p style="color: #ccc; font-size: 12px;"><strong>Password:</strong> DemoPass123!</p>
            </div>
            <div style="background: #0f0f0f; padding: 12px; border-radius: 8px; border-left: 3px solid #d4af37;">
                <p style="color: #ccc; font-size: 12px; margin-bottom: 4px;"><strong>Collega:</strong></p>
                <p style="color: #ccc; font-size: 12px; margin-bottom: 2px;"><strong>Email:</strong> parrucchiere1@salone.it</p>
                <p style="color: #ccc; font-size: 12px;"><strong>Password:</strong> DemoPass456!</p>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">← Torna alla Home</a>
        </div>
    </div>

    <script src="firebase-rest.js"></script>
    <script>
        // Inizializza i dati al caricamento della pagina
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Pagina login caricata');
            console.log('⏳ Attesa 500ms per firebase-rest.js...');

            // Aspetta che firebase-rest.js sia caricato
            setTimeout(function() {
                console.log('🔍 Checking LocalStorage availability...');
                console.log('typeof LocalStorage:', typeof LocalStorage);

                // Assicura che i dati di default siano nel localStorage
                if (!localStorage.getItem('bookingDB')) {
                    console.log('📦 localStorage vuoto, carico i dati di default...');
                    if (typeof LocalStorage !== 'undefined' && LocalStorage.getDefaultData) {
                        try {
                            const defaultData = LocalStorage.getDefaultData();
                            localStorage.setItem('bookingDB', JSON.stringify(defaultData));
                            console.log('✅ Dati di default salvati in localStorage');
                            console.log('📝 Credenziali disponibili:', defaultData.parrucchieri.map(p => `${p.email} / ${p.password}`));
                        } catch (error) {
                            console.error('❌ Errore salvataggio dati:', error);
                        }
                    } else {
                        console.error('❌ LocalStorage non disponibile');
                    }
                } else {
                    console.log('✅ Dati già presenti in localStorage');
                    try {
                        const data = JSON.parse(localStorage.getItem('bookingDB'));
                        console.log('📝 Credenziali disponibili:', data.parrucchieri?.map(p => `${p.email} / ${p.password}`) || 'NESSUNA');
                    } catch (error) {
                        console.error('❌ Errore lettura localStorage:', error);
                    }
                }
            }, 500);
        });

        function handleLogin(event) {
            event.preventDefault();

            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            // Validazione input
            if (!emailInput || !passwordInput) {
                errorMsg.textContent = '❌ Inserisci email e password';
                errorMsg.classList.add('show');
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
                return;
            }

            const email = emailInput.toLowerCase();
            const password = passwordInput;

            console.log('═══════════════════════════════════════');
            console.log('🔐 TENTATIVO LOGIN');
            console.log('═══════════════════════════════════════');
            console.log('Email inserita:', email);
            console.log('Password inserita:', password);
            console.log('═══════════════════════════════════════');

            try {
                // Carica i dati
                let data = null;

                // Metodo 1: Usa LocalStorage (firebase-rest.js)
                if (typeof LocalStorage !== 'undefined' && LocalStorage.load) {
                    data = LocalStorage.load();
                    console.log('✅ Dati da LocalStorage');
                }

                // Metodo 2: Se non disponibile, carica da localStorage diretto
                if (!data) {
                    const stored = localStorage.getItem('bookingDB');
                    if (stored) {
                        data = JSON.parse(stored);
                        console.log('✅ Dati da localStorage diretto');
                    }
                }

                // Metodo 3: Se ancora vuoto, usa i dati di default
                if (!data || !data.parrucchieri) {
                    if (typeof LocalStorage !== 'undefined' && LocalStorage.getDefaultData) {
                        data = LocalStorage.getDefaultData();
                        console.log('✅ Dati di default');
                    } else {
                        throw new Error('Sistema non inizializzato. Contattare l\'amministratore.');
                    }
                }

                // Verifica parrucchieri
                if (!data.parrucchieri || data.parrucchieri.length === 0) {
                    throw new Error('Nessun parrucchiere configurato nel sistema');
                }

                console.log('📋 Email disponibili:', data.parrucchieri.map(p => p.email.toLowerCase()));
                console.log('🔍 Cerco:', email);

                // Cerca il parrucchiere (case-insensitive per email)
                const parrucchiere = data.parrucchieri.find(p => {
                    const match = p.email.toLowerCase() === email && p.password === password;
                    console.log(`  Checking ${p.email.toLowerCase()} === ${email} && ${p.password} === ${password} = ${match}`);
                    return match;
                });

                if (parrucchiere) {
                    console.log('✅ LOGIN RIUSCITO per:', parrucchiere.name, parrucchiere.surname);

                    // Salva i dati della sessione
                    localStorage.setItem('loggedInEmail', parrucchiere.email);
                    localStorage.setItem('currentParrucchiereId', parrucchiere.id);
                    localStorage.setItem('isOwner', parrucchiere.isOwner ? 'true' : 'false');
                    localStorage.setItem('parrucchiereSession', JSON.stringify({
                        email: parrucchiere.email,
                        parrucchiereId: parrucchiere.id,
                        name: parrucchiere.name,
                        surname: parrucchiere.surname,
                        isOwner: parrucchiere.isOwner,
                        loginTime: new Date().toISOString()
                    }));

                    console.log('💾 Sessione salvata');

                    // Mostra messaggio successo
                    errorMsg.textContent = '✅ Accesso riuscito! Reindirizzamento...';
                    errorMsg.style.backgroundColor = 'rgba(20, 197, 121, 0.15)';
                    errorMsg.style.borderLeftColor = '#14c579';
                    errorMsg.style.color = '#14c579';
                    errorMsg.classList.add('show');

                    console.log('🔄 Reindirizzamento a /parrucchiere-login.html...');

                    // Reindirizza al dashboard (aumentato timeout per assicurare localStorage)
                    setTimeout(() => {
                        console.log('✅ Redirect eseguito');
                        window.location.href = '/parrucchiere-login.html';
                    }, 1500);
                } else {
                    // Errore di credenziali
                    console.log('❌ CREDENZIALI NON VALIDE');
                    errorMsg.textContent = '❌ Email o password non corretti. Verifica e riprova.';
                    errorMsg.style.backgroundColor = 'rgba(231, 76, 60, 0.15)';
                    errorMsg.style.borderLeftColor = '#e74c3c';
                    errorMsg.style.color = '#e74c3c';
                    errorMsg.classList.add('show');

                    // Pulisci campi
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('email').focus();

                    setTimeout(() => {
                        errorMsg.classList.remove('show');
                    }, 5000);
                }
            } catch (error) {
                console.error('❌ ERRORE CRITICO:', error);
                errorMsg.textContent = '❌ Errore: ' + error.message;
                errorMsg.style.backgroundColor = 'rgba(231, 76, 60, 0.15)';
                errorMsg.style.borderLeftColor = '#e74c3c';
                errorMsg.style.color = '#e74c3c';
                errorMsg.classList.add('show');
            }
        }
    </script>
</body>
</html>
