<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Homepage Caricamento</title>
    <style>
        body { background: #0f0f0f; color: #f5f5f5; font-family: Arial; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .log { background: #1a1a1a; padding: 10px; margin: 10px 0; border-radius: 5px; border-left: 3px solid #d4af37; }
        .error { border-left-color: #e74c3c; color: #e74c3c; }
        .success { border-left-color: #27ae60; color: #27ae60; }
        h1 { color: #d4af37; }
        #frameContainer { margin-top: 30px; }
        iframe { width: 100%; height: 800px; border: 2px solid #d4af37; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Test Homepage - Verifica Caricamento Servizi</h1>
        
        <div id="output"></div>
        
        <h2>Anteprima Homepage:</h2>
        <div id="frameContainer">
            <iframe src="http://localhost:8000/index.html" id="testFrame"></iframe>
        </div>
    </div>
    
    <script>
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'log ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
            div.textContent = msg;
            output.appendChild(div);
        }
        
        log('⏳ Caricamento test...');
        
        // Test 1: Verifica elementi nella pagina principale
        setTimeout(() => {
            const frame = document.getElementById('testFrame');
            try {
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                
                // Check for services
                const select = frameDoc.getElementById('bookingService');
                if (select) {
                    const options = select.querySelectorAll('option');
                    log('✅ Dropdown trovato con ' + (options.length - 1) + ' servizi effettivi', 'success');
                    
                    if (options.length > 1) {
                        for (let i = 1; i < options.length; i++) {
                            log('   📌 ' + options[i].textContent, 'success');
                        }
                    } else {
                        log('❌ ERRORE: Dropdown vuoto - nessun servizio caricato!', 'error');
                    }
                } else {
                    log('❌ ERRORE: Dropdown non trovato nel DOM', 'error');
                }
                
                // Check for services grid
                const servicesGrid = frameDoc.getElementById('servicesGrid');
                if (servicesGrid) {
                    const serviceCards = servicesGrid.querySelectorAll('div[style*="background"]');
                    log('✅ Grid trovato con ' + serviceCards.length + ' card di servizio', serviceCards.length > 0 ? 'success' : 'error');
                } else {
                    log('❌ ERRORE: servicesGrid non trovato', 'error');
                }
                
            } catch (e) {
                log('❌ ERRORE: Non posso leggere iframe (CORS/same-origin policy)', 'error');
                log('Messaggio: ' + e.message, 'error');
            }
        }, 3000);
    </script>
</body>
</html>
