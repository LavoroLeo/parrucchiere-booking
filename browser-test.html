<!DOCTYPE html>
<html>
<head>
    <title>Browser Test - Crea Servizio</title>
    <style>
        body { font-family: Arial; background: #0f0f0f; color: #f5f5f5; padding: 20px; }
        .result { background: #1a1a1a; padding: 20px; margin: 10px 0; border-left: 4px solid #d4af37; }
        .success { border-left-color: #27ae60; color: #27ae60; }
        .info { color: #3498db; }
        h1 { color: #d4af37; }
        code { background: #252525; padding: 10px; display: block; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🧪 TEST BROWSER COMPLETO</h1>

    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'result ' + type;
            div.textContent = msg;
            results.appendChild(div);
            console.log(msg);
        }

        log('▶ INIZIO TEST', 'info');

        // STEP 1: Carica servizi
        log('1️⃣ Caricamento servizi...', 'info');
        let services = JSON.parse(localStorage.getItem('services') || '[]');

        if (services.length === 0) {
            services = [
                { id: 1, name: 'Taglio Uomo', price: 25, duration: 30 },
                { id: 2, name: 'Taglio Donna', price: 35, duration: 45 },
                { id: 3, name: 'Colore', price: 80, duration: 120 },
                { id: 4, name: 'Trattamento', price: 40, duration: 20 }
            ];
            localStorage.setItem('services', JSON.stringify(services));
            log('✅ Servizi default caricati', 'success');
        } else {
            log('✅ Servizi trovati: ' + services.length, 'success');
        }

        // STEP 2: Crea nuovo servizio
        log('2️⃣ Creazione nuovo servizio...', 'info');
        const newService = {
            id: 5,
            name: 'Piega Messa in Piega',
            price: 15,
            duration: 25,
            createdAt: new Date().toISOString()
        };
        services.push(newService);
        localStorage.setItem('services', JSON.stringify(services));
        log('✅ Servizio creato: ' + newService.name + ' (ID: 5)', 'success');

        // STEP 3: Verifica salvataggio
        log('3️⃣ Verifica salvataggio...', 'info');
        const savedServices = JSON.parse(localStorage.getItem('services') || '[]');
        log('✅ Servizi salvati: ' + savedServices.length, 'success');
        savedServices.forEach((s, i) => {
            const marker = s.id === 5 ? ' ✨ [NUOVO]' : ' 📌';
            log('   ' + (i+1) + '. ' + s.name + ' - ' + s.price + '€ (' + s.duration + 'min)' + marker, 'info');
        });

        // STEP 4: Crea prenotazione
        log('4️⃣ Creazione prenotazione con nuovo servizio...', 'info');
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);

        const booking = {
            id: 'booking_' + Date.now(),
            data: tomorrow.toLocaleDateString('it-IT'),
            ora: '14:00',
            servizio: newService.name,
            cliente: 'Gianna Bianchi',
            telefono: '3209876543',
            durata: newService.duration,
            prezzo: newService.price,
            serviceId: newService.id,
            timestamp: new Date().toISOString(),
            status: 'Confermata'
        };
        localStorage.setItem(booking.id, JSON.stringify(booking));
        log('✅ Prenotazione salvata', 'success');

        // STEP 5: Verifica prenotazione
        log('5️⃣ Verifica prenotazione...', 'info');
        const savedBooking = JSON.parse(localStorage.getItem(booking.id) || '{}');
        log('✅ Prenotazione trovata', 'success');
        log('   👤 Cliente: ' + savedBooking.cliente, 'info');
        log('   ✂️ Servizio: ' + savedBooking.servizio, 'info');
        log('   📅 Data: ' + savedBooking.data + ' ' + savedBooking.ora, 'info');
        log('   💰 Prezzo: ' + savedBooking.prezzo + '€', 'info');
        log('   ⏱️ Durata: ' + savedBooking.durata + ' min', 'info');

        // STEP 6: Verifica coerenza dati
        log('6️⃣ Verifica coerenza dati...', 'info');
        const serviceInList = savedServices.find(s => s.id === savedBooking.serviceId);
        if (serviceInList) {
            log('✅ Servizio trovato in lista', 'success');
            log('   Prezzo coerente: ' + (serviceInList.price === savedBooking.prezzo ? 'SÌ ✅' : 'NO ❌'), 'info');
            log('   Durata coerente: ' + (serviceInList.duration === savedBooking.durata ? 'SÌ ✅' : 'NO ❌'), 'info');
        }

        // STEP 7: Test filtro cliente
        log('7️⃣ Test filtro cliente (come su cliente-prenotazioni.html)...', 'info');
        const allBookings = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('booking_')) {
                allBookings.push(JSON.parse(localStorage.getItem(key)));
            }
        }
        const clientBookings = allBookings.filter(b => b.cliente === 'Gianna Bianchi');
        log('✅ Prenotazioni trovate per "Gianna Bianchi": ' + clientBookings.length, 'success');
        clientBookings.forEach(b => {
            log('   📋 ' + b.data + ' ' + b.ora + ' - ' + b.servizio, 'info');
        });

        // RISULTATO FINALE
        log('', 'info');
        log('🚀 TEST COMPLETATO CON SUCCESSO!', 'success');
        log('✅ Nuovo servizio creato e salvato', 'success');
        log('✅ Prenotazione creata con nuovo servizio', 'success');
        log('✅ Dati coerenti e sincronizzati', 'success');
        log('✅ Filtro cliente funzionante', 'success');
        log('✅ PRONTO PER PRODUZIONE!', 'success');

        // Mostra anche in console
        console.log('\n=== DATI SALVATI IN LOCALSTORAGE ===');
        console.log('Services:', JSON.stringify(savedServices, null, 2));
        console.log('\nBooking:', JSON.stringify(savedBooking, null, 2));
    </script>
</body>
</html>
