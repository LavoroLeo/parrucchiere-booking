<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Parrucchiere Rossi</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.99), rgba(20, 20, 20, 0.97));
            border-bottom: 3px solid #d4af37;
            height: 80px;
            display: flex;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header-container {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }

        .logo-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(135deg, #d4af37, #c0a080);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
            margin-right: 15px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #f5f5f5;
            letter-spacing: 2px;
        }

        .login-wrapper {
            margin-top: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            padding: 40px 20px;
        }

        .login-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: none;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 32px;
            color: #d4af37;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
            font-family: 'Playfair Display', serif;
        }

        .login-header p {
            color: #d4af37;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #f5f5f5;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(245, 245, 245, 0.05);
            color: #f5f5f5;
            font-family: 'Inter', -apple-system, sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(245, 245, 245, 0.5);
        }

        .form-group input:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(245, 245, 245, 0.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37, #c0a080);
            color: #0f0f0f;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .login-button:hover {
            background: linear-gradient(135deg, #f5d547, #d4af37);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }

        .demo-credentials {
            background: rgba(212, 175, 55, 0.1);
            border-left: 4px solid #d4af37;
            padding: 16px;
            border-radius: 8px;
            margin-top: 24px;
            font-size: 13px;
            color: #d4af37;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .error-message {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid rgba(255, 107, 107, 0.3);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        @media (max-width: 600px) {
            .header-container { padding: 0 20px; }
            .login-container { padding: 30px; }
            .login-header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-container">
            <div style="display: flex; align-items: center;">
                <div class="logo-placeholder">PR</div>
                <div class="logo-text">PARRUCCHIERE ROSSI</div>
            </div>
        </div>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <h1>🔐 Accedi</h1>
                <p>Dashboard Parrucchiere</p>
            </div>
            <div id="error-message" class="error-message"></div>
            <form id="parrucchiere-login-form">
                <div class="form-group">
                    <label for="email">📧 Email:</label>
                    <input type="email" id="email" name="email" placeholder="admin@salone.it" required>
                </div>
                <div class="form-group">
                    <label for="password">🔐 Password:</label>
                    <input type="password" id="password" name="password" placeholder="La tua password" required>
                </div>
                <button type="submit" class="login-button">Accedi</button>
            </form>
            <div class="demo-credentials">
                <strong>Demo: admin@salone.it / DemoPass123!</strong>
            </div>
        </div>
    </div>
    <script src="firebase-rest.js"></script>
    <script src="parrucchiere-login-handler.js"></script>
</body>
</html>
