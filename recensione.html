<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lascia una Recensione - Parrucchiere Rossi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: linear-gradient(135deg, #1a1a1a, #252525);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.15);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 32px;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #ccc;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .booking-info {
            background: rgba(212, 175, 55, 0.1);
            border-left: 3px solid #d4af37;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 13px;
            color: #ccc;
        }
        .booking-info strong { color: #d4af37; }
        .stars-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .stars-label {
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .stars {
            display: inline-flex;
            gap: 10px;
            font-size: 50px;
            cursor: pointer;
        }
        .star {
            color: #444;
            transition: all 0.3s;
            cursor: pointer;
            user-select: none;
        }
        .star.active { color: #ffd700; transform: scale(1.1); }
        .star:hover { transform: scale(1.2); }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            color: #d4af37;
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            padding: 14px;
            background: #0f0f0f;
            color: #f5f5f5;
            border: 1px solid #333;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
        }
        textarea:focus { outline: none; border-color: #d4af37; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37, #c0a080);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .message.success { background: rgba(20, 197, 121, 0.15); color: #14c579; border-left: 3px solid #14c579; display: block; }
        .message.error { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border-left: 3px solid #e74c3c; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐ Lascia una Recensione</h1>
        <p class="subtitle">Parrucchiere Rossi - Grazie per la tua visita!</p>

        <div id="bookingInfo" class="booking-info" style="display: none;"></div>

        <div id="reviewForm">
            <div class="stars-container">
                <div class="stars-label">Quanto sei soddisfatto del servizio?</div>
                <div class="stars" id="stars">
                    <span class="star" data-rating="1">★</span>
                    <span class="star" data-rating="2">★</span>
                    <span class="star" data-rating="3">★</span>
                    <span class="star" data-rating="4">★</span>
                    <span class="star" data-rating="5">★</span>
                </div>
            </div>

            <div class="form-group">
                <label>💬 Raccontaci la tua esperienza</label>
                <textarea id="comment" placeholder="Esempio: Servizio eccellente, taglio perfetto e personale molto cortese..."></textarea>
            </div>

            <button onclick="submitReview()">📤 Invia Recensione</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const FIREBASE_URL = 'https://parrucchieri-online-default-rtdb.europe-west1.firebasedatabase.app';
        const BUSINESS_ID = 'demo-parrucchiere-rossi';

        let currentRating = 0;
        let currentBooking = null;

        // Stars logic
        document.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', () => {
                currentRating = parseInt(star.dataset.rating);
                updateStars();
            });
            star.addEventListener('mouseenter', () => {
                const r = parseInt(star.dataset.rating);
                document.querySelectorAll('.star').forEach(s => {
                    s.classList.toggle('active', parseInt(s.dataset.rating) <= r);
                });
            });
        });
        document.getElementById('stars').addEventListener('mouseleave', updateStars);

        function updateStars() {
            document.querySelectorAll('.star').forEach(s => {
                s.classList.toggle('active', parseInt(s.dataset.rating) <= currentRating);
            });
        }

        // Load booking from URL params
        async function loadBooking() {
            const params = new URLSearchParams(window.location.search);

            const cliente = params.get('cliente');
            const servizio = params.get('servizio');
            const dataB = params.get('data');
            const parrucchiereId = params.get('parrucchiereId') || 'p1';

            if (!cliente || !servizio) {
                showMessage('❌ Link non valido', 'error');
                document.getElementById('reviewForm').style.display = 'none';
                return;
            }

            currentBooking = {
                cliente: cliente,
                servizio: servizio,
                data: dataB,
                parrucchiereId: parrucchiereId
            };

            // Mostra info prenotazione
            document.getElementById('bookingInfo').innerHTML = `
                <strong>Cliente:</strong> ${cliente}<br>
                <strong>Servizio:</strong> ${servizio}<br>
                ${dataB ? `<strong>Data:</strong> ${dataB}` : ''}
            `;
            document.getElementById('bookingInfo').style.display = 'block';
        }

        async function submitReview() {
            if (currentRating === 0) {
                showMessage('⭐ Seleziona almeno una stella', 'error');
                return;
            }

            const comment = document.getElementById('comment').value.trim();
            if (!comment) {
                showMessage('💬 Scrivi un commento', 'error');
                return;
            }

            try {
                const res = await fetch(`${FIREBASE_URL}/businesses/${BUSINESS_ID}.json`);
                const data = await res.json();

                // Aggiungi recensione
                if (!data.reviews) data.reviews = [];
                if (!Array.isArray(data.reviews)) data.reviews = Object.values(data.reviews);

                const review = {
                    id: 'review_' + Date.now(),
                    parrucchiereId: currentBooking.parrucchiereId,
                    cliente: currentBooking.cliente,
                    servizio: currentBooking.servizio,
                    data: currentBooking.data,
                    rating: currentRating,
                    comment: comment,
                    timestamp: new Date().toISOString()
                };

                data.reviews.push(review);

                // Salva su Firebase
                const saveRes = await fetch(`${FIREBASE_URL}/businesses/${BUSINESS_ID}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (saveRes.ok) {
                    document.getElementById('reviewForm').style.display = 'none';
                    document.getElementById('bookingInfo').style.display = 'none';
                    showMessage('✅ Grazie per la tua recensione! La tua opinione è importante per noi.', 'success');
                } else {
                    showMessage('❌ Errore nel salvataggio. Riprova.', 'error');
                }
            } catch (err) {
                showMessage('❌ Errore: ' + err.message, 'error');
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        loadBooking();
    </script>
</body>
</html>
