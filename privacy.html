<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrucchiere Rossi - Privacy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #f5f5f5;
            line-height: 1.6;
            padding: 20px;
        }

        .privacy-container {
            max-width: 900px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1a1a1a, #252525);
            padding: 50px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .privacy-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 20px;
        }

        .privacy-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: #d4af37;
            margin-bottom: 10px;
        }

        .privacy-header p {
            color: #cccccc;
            font-size: 14px;
        }

        .privacy-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #d4af37;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .privacy-content p {
            margin-bottom: 15px;
            color: #ccc;
            line-height: 1.8;
        }

        .privacy-content ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .privacy-content li {
            margin-bottom: 8px;
            color: #ccc;
        }

        .close-button {
            background: linear-gradient(135deg, #d4af37, #c0a080);
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin-top: 30px;
            width: 100%;
        }

        .close-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        .last-updated {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="privacy-container">
        <div class="privacy-header">
            <h1>Privacy Policy</h1>
            <p>Parrucchiere Rossi - Tutela dei dati personali</p>
        </div>

        <div class="privacy-content">
            <p>Raccogliamo il tuo nome, telefono ed email per gestire la tua prenotazione e contattarti per il tuo appuntamento. I tuoi dati sono protetti e non saranno condivisi con nessuno.</p>

            <button class="close-button" onclick="window.close()">Chiudi</button>
        </div>
    </div>

    <!-- Firebase SDK (NPM Bundle - Fully Functional) -->
    <script src="public/firebase-bundle.js"></script>
    <script src="firebase-database.js"></script>
    <script src="firebase-sync.js"></script>
    <script src="firebase-autosave.js"></script>
    <script>
        // Update page title with salon name
        function updatePageTitle() {
            const salonName = localStorage.getItem('salone_name') || 'Parrucchiere Rossi';
            document.title = salonName + ' - Privacy';
        }

        window.addEventListener('DOMContentLoaded', function() {
            updatePageTitle();

            // Load salon name from Firebase
            (async () => {
                try {
                    if (typeof DatabaseAdapter !== 'undefined') {
                        const data = await DatabaseAdapter.load();
                        if (data && data.settings && data.settings.name) {
                            document.title = data.settings.name + ' - Privacy';
                            localStorage.setItem('salone_name', data.settings.name);
                        }
                    }
                } catch (e) {
                    console.warn('Errore caricamento nome salone da Firebase:', e.message);
                }
            })();
        });
    </script>
</body>
</html>
