<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrucchiere Rossi - Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: linear-gradient(135deg, #1a1a1a, #252525);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.15);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #d4af37, #c0a080);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 32px;
            color: #000;
            margin: 0 auto 25px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: #d4af37;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #ccc;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            color: #f5f5f5;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #333;
            background: #0f0f0f;
            color: #f5f5f5;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37, #c0a080);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
        .home-link {
            display: inline-block;
            width: calc(100% - 4px);
            padding: 12px 16px;
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            border: 2px solid #d4af37;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }
        .home-link:hover {
            background: rgba(212, 175, 55, 0.25);
        }
        .error {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
            font-size: 14px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .credentials {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
        }
        .credentials p {
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .cred-box {
            background: #0f0f0f;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #d4af37;
        }
        .cred-box p {
            color: #ccc;
            font-size: 12px;
            margin: 2px 0;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">PR</div>
        <h1>Dashboard</h1>
        <p class="subtitle">Parrucchiere Rossi</p>

        <div class="error" id="errorMsg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="admin@admin.it" required autofocus>
            </div>

            <div class="form-group">
                <label>🔐 Password</label>
                <input type="password" id="password" placeholder="admin123" required>
            </div>

            <button type="submit">🔓 Accedi al Dashboard</button>
            <a href="index.html" class="home-link">🏠 Torna alla Home</a>
        </form>

        <div class="credentials">
            <p>📝 Demo Credentials:</p>
            <div class="cred-box">
                <p><strong>Email:</strong> admin@admin.it</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>

    <script>
        const USERS = [
            { email: 'admin@admin.it', password: 'admin123', name: 'Marco Rossi' },
            { email: 'anna@admin.it', password: 'anna123', name: 'Anna Bianchi' }
        ];

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            const user = USERS.find(u => u.email.toLowerCase() === email && u.password === password);

            if (user) {
                localStorage.setItem('loggedIn', JSON.stringify(user));
                alert('✅ Login riuscito! Benvenuto ' + user.name);
                // Reindirizza alla dashboard
                window.location.href = 'parrucchiere-login.html';
            } else {
                errorMsg.textContent = '❌ Email o password non corretti';
                errorMsg.classList.add('show');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                setTimeout(() => errorMsg.classList.remove('show'), 5000);
            }
        }
    </script>
</body>
</html>
